# Promote: triggered by release:published event.
# Re-tags the candidate image by digest to vX.Y.Z + :latest. No rebuild.
# Supports: udi-tools, udi-tools-claude, devbox, devbox-claude.

on:
  release:
    types: [published]

permissions:
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release tag
        id: release
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Promote udi-tools by digest
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          # Pull candidate by digest, then re-tag to release + latest
          CANDIDATE_DIGEST=$(docker pull --quiet ${REGISTRY}/udi-tools:${TAG} 2>/dev/null || echo "")
          if [ -n "$CANDIDATE_DIGEST" ]; then
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/udi-tools:${TAG}
            docker push ${REGISTRY}/udi-tools:${TAG}
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/udi-tools:latest
            docker push ${REGISTRY}/udi-tools:latest
          else
            echo "No udi-tools image found for tag ${TAG}"
            exit 1
          fi

      - name: Promote udi-tools-claude by digest
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          CANDIDATE_DIGEST=$(docker pull --quiet ${REGISTRY}/udi-tools-claude:${TAG}-claude 2>/dev/null || echo "")
          if [ -n "$CANDIDATE_DIGEST" ]; then
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/udi-tools-claude:${TAG}-claude
            docker push ${REGISTRY}/udi-tools-claude:${TAG}-claude
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/udi-tools-claude:latest
            docker push ${REGISTRY}/udi-tools-claude:latest
          else
            echo "No udi-tools-claude image found for tag ${TAG}"
            exit 1
          fi

      - name: Promote devbox by digest
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          CANDIDATE_DIGEST=$(docker pull --quiet ${REGISTRY}/devbox:${TAG} 2>/dev/null || echo "")
          if [ -n "$CANDIDATE_DIGEST" ]; then
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/devbox:${TAG}
            docker push ${REGISTRY}/devbox:${TAG}
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/devbox:latest
            docker push ${REGISTRY}/devbox:latest
          else
            echo "No devbox image found for tag ${TAG}"
            exit 1
          fi

      - name: Promote devbox-claude by digest
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          CANDIDATE_DIGEST=$(docker pull --quiet ${REGISTRY}/devbox-claude:${TAG} 2>/dev/null || echo "")
          if [ -n "$CANDIDATE_DIGEST" ]; then
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/devbox-claude:${TAG}
            docker push ${REGISTRY}/devbox-claude:${TAG}
            docker tag ${CANDIDATE_DIGEST} ${REGISTRY}/devbox-claude:latest
            docker push ${REGISTRY}/devbox-claude:latest
          else
            echo "No devbox-claude image found for tag ${TAG}"
            exit 1
          fi
