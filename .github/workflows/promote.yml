# Promote: triggered by release:published event.
# Re-tags the candidate image by digest to vX.Y.Z + :latest. No rebuild.
# Supports: udi-tools, udi-tools-claude, devbox, devbox-claude.

on:
  release:
    types: [published]

permissions:
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release and candidate tags
        id: resolve
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          # Derive candidate tag from release tag: v0.2.0 → v0.2.0-rc.N (latest rc)
          VERSION=$(echo "$TAG" | sed 's/^v//')
          CANDIDATE=$(git tag -l "v${VERSION}-rc.*" | grep -E "^v${VERSION}-rc\.[0-9]+$" | sort -V | tail -1)

          if [ -z "$CANDIDATE" ]; then
            echo "::error::No candidate tag found for version ${VERSION}"
            exit 1
          fi

          echo "release_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "candidate=${CANDIDATE}" >> $GITHUB_OUTPUT
          echo "registry=${REGISTRY}" >> $GITHUB_OUTPUT

      - name: Promote udi-tools by digest
        run: |
          REGISTRY="${{ steps.resolve.outputs.registry }}"
          CANDIDATE="${{ steps.resolve.outputs.candidate }}"
          TAG="${{ steps.resolve.outputs.release_tag }}"

          # Pull candidate image, get its digest
          if ! docker pull ${REGISTRY}/udi-tools:${CANDIDATE}; then
            echo "::error::Failed to pull udi-tools candidate ${CANDIDATE}"
            exit 1
          fi

          # Get the image ID (digest reference)
          IMAGE_ID=$(docker inspect --format '{{.Id}}' ${REGISTRY}/udi-tools:${CANDIDATE})
          echo "Promoting udi-tools: ${IMAGE_ID} → ${TAG} + :latest"

          docker tag ${IMAGE_ID} ${REGISTRY}/udi-tools:${TAG}
          docker push ${REGISTRY}/udi-tools:${TAG}
          docker tag ${IMAGE_ID} ${REGISTRY}/udi-tools:latest
          docker push ${REGISTRY}/udi-tools:latest

      - name: Promote udi-tools-claude by digest
        run: |
          REGISTRY="${{ steps.resolve.outputs.registry }}"
          CANDIDATE="${{ steps.resolve.outputs.candidate }}"
          TAG="${{ steps.resolve.outputs.release_tag }}"
          DERIV_TAG="${CANDIDATE}-claude"

          if ! docker pull ${REGISTRY}/udi-tools-claude:${DERIV_TAG}; then
            echo "::error::Failed to pull udi-tools-claude candidate ${DERIV_TAG}"
            exit 1
          fi

          IMAGE_ID=$(docker inspect --format '{{.Id}}' ${REGISTRY}/udi-tools-claude:${DERIV_TAG})
          RELEASE_CLAUDE="${TAG}-claude"
          echo "Promoting udi-tools-claude: ${IMAGE_ID} → ${RELEASE_CLAUDE} + :latest"

          docker tag ${IMAGE_ID} ${REGISTRY}/udi-tools-claude:${RELEASE_CLAUDE}
          docker push ${REGISTRY}/udi-tools-claude:${RELEASE_CLAUDE}
          docker tag ${IMAGE_ID} ${REGISTRY}/udi-tools-claude:latest
          docker push ${REGISTRY}/udi-tools-claude:latest

      - name: Promote devbox by digest
        run: |
          REGISTRY="${{ steps.resolve.outputs.registry }}"
          CANDIDATE="${{ steps.resolve.outputs.candidate }}"
          TAG="${{ steps.resolve.outputs.release_tag }}"

          if ! docker pull ${REGISTRY}/devbox:${CANDIDATE}; then
            echo "::error::Failed to pull devbox candidate ${CANDIDATE}"
            exit 1
          fi

          IMAGE_ID=$(docker inspect --format '{{.Id}}' ${REGISTRY}/devbox:${CANDIDATE})
          echo "Promoting devbox: ${IMAGE_ID} → ${TAG} + :latest"

          docker tag ${IMAGE_ID} ${REGISTRY}/devbox:${TAG}
          docker push ${REGISTRY}/devbox:${TAG}
          docker tag ${IMAGE_ID} ${REGISTRY}/devbox:latest
          docker push ${REGISTRY}/devbox:latest

      - name: Promote devbox-claude by digest
        run: |
          REGISTRY="${{ steps.resolve.outputs.registry }}"
          CANDIDATE="${{ steps.resolve.outputs.candidate }}"
          TAG="${{ steps.resolve.outputs.release_tag }}"

          if ! docker pull ${REGISTRY}/devbox-claude:${CANDIDATE}; then
            echo "::error::Failed to pull devbox-claude candidate ${CANDIDATE}"
            exit 1
          fi

          IMAGE_ID=$(docker inspect --format '{{.Id}}' ${REGISTRY}/devbox-claude:${CANDIDATE})
          echo "Promoting devbox-claude: ${IMAGE_ID} → ${TAG} + :latest"

          docker tag ${IMAGE_ID} ${REGISTRY}/devbox-claude:${TAG}
          docker push ${REGISTRY}/devbox-claude:${TAG}
          docker tag ${IMAGE_ID} ${REGISTRY}/devbox-claude:latest
          docker push ${REGISTRY}/devbox-claude:latest
