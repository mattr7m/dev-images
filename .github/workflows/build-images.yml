# Reusable build+push engine for dev-images images.
# Called by pr.yml, daily-prerelease.yml, cut-candidate.yml, release.yml.
# All build steps live here — the only copy of the build logic.
# Uses docker (not podman) to avoid disk space issues on GH Actions runners.

on:
  workflow_call:
    inputs:
      image:
        description: "Image name (udi-tools, udi-tools-claude, devbox, or devbox-claude)"
        type: string
        required: true
      tags:
        description: "Comma-separated list of tags to apply (first tag is used for build)"
        type: string
        required: false
        default: "latest"
      push:
        description: "Whether to push to registry"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af --volumes 2>/dev/null || true
          df -h / | tail -1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse tags
        id: parse
        run: |
          IFS=',' read -ra TAGS <<< "${{ inputs.tags }}"
          echo "primary=${TAGS[0]# }" >> $GITHUB_OUTPUT
          REMAINING=""
          for i in "${!TAGS[@]}"; do
            if [ "$i" -gt 0 ]; then
              T="${TAGS[$i]# }"
              if [ -n "$REMAINING" ]; then
                REMAINING="${REMAINING},${T}"
              else
                REMAINING="${T}"
              fi
            fi
          done
          echo "remaining=${REMAINING}" >> $GITHUB_OUTPUT

      - name: Build image
        id: build
        run: |
          set -e
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          PRIMARY="${{ steps.parse.outputs.primary }}"
          TAGS="-t ${REGISTRY}/${{ inputs.image }}:${PRIMARY}"
          if [ -n "${{ steps.parse.outputs.remaining }}" ]; then
            IFS=',' read -ra EXTRA_TAGS <<< "${{ steps.parse.outputs.remaining }}"
            for t in "${EXTRA_TAGS[@]}"; do
              TAGS="${TAGS} -t ${REGISTRY}/${{ inputs.image }}:${t}"
            done
          fi
          docker build ${TAGS} -f images/${{ inputs.image }}/Containerfile . >> build.log 2>&1
          IMAGE_ID=$(docker images --format '{{.ID}}' ${REGISTRY}/${{ inputs.image }}:${PRIMARY} | head -1)
          echo "image_id=${IMAGE_ID}" >> $GITHUB_OUTPUT
          tail -n 30 build.log

      - name: Push image
        if: inputs.push == true && steps.build.outputs.image_id != ''
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          PRIMARY="${{ steps.parse.outputs.primary }}"
          IMAGE_ID="${{ steps.build.outputs.image_id }}"

          docker tag ${IMAGE_ID} ${REGISTRY}/${{ inputs.image }}:${PRIMARY}
          docker push ${REGISTRY}/${{ inputs.image }}:${PRIMARY}

          # Also push :latest alias
          docker tag ${IMAGE_ID} ${REGISTRY}/${{ inputs.image }}:latest
          docker push ${REGISTRY}/${{ inputs.image }}:latest

          if [ -n "${{ steps.parse.outputs.remaining }}" ]; then
            IFS=',' read -ra EXTRA_TAGS <<< "${{ steps.parse.outputs.remaining }}"
            for t in "${EXTRA_TAGS[@]}"; do
              docker tag ${IMAGE_ID} ${REGISTRY}/${{ inputs.image }}:${t}
              docker push ${REGISTRY}/${{ inputs.image }}:${t}
            done
          fi

      - name: Show build log tail
        if: always()
        run: |
          echo "### Build log (tail)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build.log | tail -100 >> $GITHUB_STEP_SUMMARY || echo "(no build log available)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
