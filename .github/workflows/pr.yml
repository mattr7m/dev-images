# Required PR check: build without push, lint, verify-pins
# Gates merge — must pass before a PR can land on main.

on:
  pull_request:
    branches: [main]
    paths:
      - "images/**"
      - "scripts/**"
      - ".github/workflows/pr.yml"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/verify-pins.yml"
      - "Makefile"
      - "VERSION"

permissions:
  contents: read
  packages: write

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space before build
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af --volumes 2>/dev/null || true
          df -h / | tail -1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build udi-tools (push:false)
        id: build-udi
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          docker build -t ${REGISTRY}/udi-tools:pr-test -f images/udi-tools/Containerfile . >> build.log 2>&1 || { tail -n 30 build.log; exit 1; }
          echo "id=$(docker images --format '{{.ID}}' ${REGISTRY}/udi-tools:pr-test | head -1)" >> $GITHUB_OUTPUT

      - name: Build udi-tools-claude (push:false)
        id: build-claude
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          UDI_ID="${{ steps.build-udi.outputs.id }}"
          docker tag ${UDI_ID} udi-tools
          docker build -t ${REGISTRY}/udi-tools-claude:pr-test -f images/udi-tools-claude/Containerfile . >> build2.log 2>&1 || { tail -n 30 build2.log; exit 1; }

      - name: Prune intermediate images
        run: |
          sudo docker image prune -af --filter 'label!=maintainer' 2>/dev/null || true
          df -h / | tail -1

      - name: Build devbox (push:false)
        id: build-devbox
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          docker build -t ${REGISTRY}/devbox:pr-test -f images/devbox/Containerfile . >> build3.log 2>&1 || { tail -n 30 build3.log; exit 1; }
          echo "id=$(docker images --format '{{.ID}}' ${REGISTRY}/devbox:pr-test | head -1)" >> $GITHUB_OUTPUT

      - name: Build devbox-claude (push:false)
        id: build-devbox-claude
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          DEVBOX_ID="${{ steps.build-devbox.outputs.id }}"
          docker tag ${DEVBOX_ID} devbox
          docker build -t ${REGISTRY}/devbox-claude:pr-test -f images/devbox-claude/Containerfile . >> build4.log 2>&1 || { tail -n 30 build4.log; exit 1; }

      - name: Lint Containerfiles
        run: make lint

  verify-pins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for floating references
        run: |
          ERRORS=0

          for cf in images/*/Containerfile; do
            echo "==> Checking $cf for floating refs..."

            # Check for releases/latest downloads
            if grep -n 'releases/latest/download' "$cf" >/dev/null 2>&1; then
              echo "::error::$cf: contains 'releases/latest' — must pin to explicit version"
              ERRORS=$((ERRORS + 1))
              grep -n 'releases/latest/download' "$cf"
            fi

            # Check for bare :latest or rolling base tags (not vX.Y.Z)
            if grep -nP '^FROM\s+\S+:latest(\s|$)' "$cf" >/dev/null 2>&1; then
              echo "::error::$cf: uses :latest as base image"
              ERRORS=$((ERRORS + 1))
              grep -n ':latest' "$cf"
            fi

            # Check for master-branch raw URLs (colordiff, etc.)
            if grep -nP 'github\.com/[^/]+/[^/]+/blob/master/' "$cf" >/dev/null 2>&1; then
              echo "::error::$cf: downloads from a master branch — pin to a release tag"
              ERRORS=$((ERRORS + 1))
              grep -n 'blob/master/' "$cf"
            fi

            # Check for curl | bash patterns
            if grep -nP 'curl\s.*\|\s*(ba)?sh' "$cf" >/dev/null 2>&1; then
              echo "::error::$cf: contains 'curl | bash' pattern"
              ERRORS=$((ERRORS + 1))
              grep -n 'curl.*|.*(ba)?sh' "$cf"
            fi

          done

          if [ $ERRORS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## verify-pins summary" >> $GITHUB_STEP_SUMMARY
            echo "Found $ERRORS pin verification failure(s)." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "All checks passed — no floating references found."
