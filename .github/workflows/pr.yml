# Required PR check: build without push, lint, verify-pins
# Gates merge — must pass before a PR can land on main.

on:
  pull_request:
    branches: [main]
    paths:
      - "images/**"
      - "scripts/**"
      - ".github/workflows/pr.yml"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/verify-pins.yml"
      - "Makefile"
      - "VERSION"

permissions: read-all

jobs:
  build-and-lint:
    uses: ./.github/workflows/build-images.yml
    with:
      image: udi-tools
      tags: pr-test
      push: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Containerfiles
        run: make lint

  verify-pins:
    uses: ./.github/workflows/verify-pins.yml
