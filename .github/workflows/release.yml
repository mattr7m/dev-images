# Weekly release: pick the latest green candidate, cut a clean vX.Y.Z GitHub Release,
# and promote by digest (no rebuild). Skips if already released.
#
# Promotion-by-digest: what ships is exactly what was tested — no rebuild.
# The selected candidate images are re-tagged to vX.Y.Z + :latest via buildx imagetools
# create (registry-side, no pull). This matches repo-rules §12 and image-maintainer
# guidance.
#
# Release flow (bump → cut → release): the guard keys on VERSION — if the clean tag
# (e.g. v0.2.0) already exists as a git tag, every scheduled run skips forever. This means
# an unreleased candidate (e.g. v0.2.0-rc.16) can never be released unless VERSION is bumped
# first. Intended flow:
#   1. Bump VERSION via PR (e.g. 0.2.0 → 0.2.1 for fixes/bumps without new features).
#   2. After merge, the next scheduled cut-candidate produces v0.2.1-rc.N carrying the same
#      HEAD.
#   3. The Monday release run (or human-approved workflow_dispatch) promotes v0.2.1-rc.N by
#      digest to v0.2.1 + :latest.
# This ensures candidates always have a path to release and the skip guard doesn't block
# legitimate candidate releases indefinitely.

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: "Candidate tag to release (e.g. v0.2.0-rc.1); omit for latest"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get VERSION
        id: version
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Select candidate tag
        id: select
        run: |
          CANDIDATE="${{ github.event.inputs.candidate_tag }}"
          if [ -z "$CANDIDATE" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            CANDIDATE=$(git tag -l "v${VERSION}-rc.*" | sort -V | tail -1)
          fi
          if [ -z "$CANDIDATE" ]; then
            echo "::error::No candidate tags found for version ${{ steps.version.outputs.version }}"
            exit 1
          fi
          echo "candidate=${CANDIDATE}" >> $GITHUB_OUTPUT

      - name: Check if already released
        id: check-released
        run: |
          CLEAN_TAG="${{ steps.version.outputs.version }}"
          if git tag -l "${CLEAN_TAG}" | grep -q .; then
            echo "already=true" >> $GITHUB_OUTPUT
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        id: skip
        if: steps.check-released.outputs.already == 'true'
        run: |
          echo "::notice::Release ${{ steps.version.outputs.version }} already exists — skipping."
          echo "skipped=true" >> $GITHUB_OUTPUT

      - name: Derive clean release tag
        id: derive
        # Only runs if not skipped
        if: steps.check-released.outputs.already != 'true'
        run: |
          CLEAN_TAG="${{ steps.version.outputs.version }}"
          echo "clean_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: steps.check-released.outputs.already != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate images by digest (no rebuild)
        if: steps.check-released.outputs.already != 'true'
        id: promote
        run: |
          CLEAN="${{ steps.derive.outputs.clean_tag }}"
          CANDIDATE="${{ steps.select.outputs.candidate }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          echo "Promoting candidate ${CANDIDATE} → release ${CLEAN} (by digest, no rebuild)"

          IMAGES="udi-tools udi-tools-claude devbox devbox-claude"
          for IMG in $IMAGES; do
            TAG_SUFFIX=""
            if [ "$IMG" = "udi-tools-claude" ]; then
              TAG_SUFFIX="-claude"
            fi

            echo "Re-tagging ${REGISTRY}/${IMG}:${CANDIDATE}${TAG_SUFFIX} → ${REGISTRY}/${IMG}:${CLEAN}${TAG_SUFFIX} + ${REGISTRY}/${IMG}:latest"

            # Registry-side re-tag via buildx imagetools create (no pull, no rebuild)
            docker buildx imagetools create \
              -t ${REGISTRY}/${IMG}:${CLEAN}${TAG_SUFFIX} \
              -t ${REGISTRY}/${IMG}:latest \
              ${REGISTRY}/${IMG}:${CANDIDATE}${TAG_SUFFIX}

            # Prove digest equality: candidate and release tag must resolve to the same manifest digest
            CANDIDATE_DIGEST=$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' ${REGISTRY}/${IMG}:${CANDIDATE}${TAG_SUFFIX} 2>/dev/null || echo "N/A")
            RELEASE_DIGEST=$(docker buildx imagetools inspect --format '{{.Manifest.Digest}}' ${REGISTRY}/${IMG}:${CLEAN}${TAG_SUFFIX} 2>/dev/null || echo "N/A")
            if [ "$CANDIDATE_DIGEST" != "$RELEASE_DIGEST" ] || [ "$CANDIDATE_DIGEST" = "N/A" ]; then
              echo "::error::digest mismatch for ${IMG}: candidate=${CANDIDATE_DIGEST} release=${RELEASE_DIGEST}"
              exit 1
            fi
            echo "  ${IMG}: candidate digest=${CANDIDATE_DIGEST} release digest=${RELEASE_DIGEST}"
          done

      - name: Create GitHub Release with version changes section
        if: steps.check-released.outputs.already != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLEAN="${{ steps.derive.outputs.clean_tag }}"
          CANDIDATE="${{ steps.select.outputs.candidate }}"

          # Start notes with Image version changes from manifest
          NOTES_FILE=$(mktemp)
          echo "## Image version changes" > "$NOTES_FILE"
          if [ -f version-lock-manifest.yaml ]; then
            cat version-lock-manifest.yaml >> "$NOTES_FILE"
          else
            echo "_No version lock manifest found. This release was not cut from a candidate._" >> "$NOTES_FILE"
          fi
          echo "" >> "$NOTES_FILE"

          # Append auto-generated release notes (PRs since last release)
          gh release create "${CLEAN}" --generate-notes --target main --prerelease=false \
            --notes-file "$NOTES_FILE" 2>&1 || {
            echo "Release may already exist or failed to create"
            exit 1
          }
