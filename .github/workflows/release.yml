# Weekly release: pick the latest green candidate, cut a clean vX.Y.Z GitHub Release,
# and promote by digest (no rebuild). Skips if already released.
#
# Promotion-by-digest: what ships is exactly what was tested — no rebuild.
# The selected candidate images are pulled @digest, re-tagged to vX.Y.Z + :latest,
# and pushed. This matches repo-rules §12 and image-maintainer guidance.

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: "Candidate tag to release (e.g. v0.2.0-rc.1); omit for latest"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get VERSION
        id: version
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Select candidate tag
        id: select
        run: |
          CANDIDATE="${{ github.event.inputs.candidate_tag }}"
          if [ -z "$CANDIDATE" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            CANDIDATE=$(git tag -l "v${VERSION}-rc.*" | sort -V | tail -1)
          fi
          if [ -z "$CANDIDATE" ]; then
            echo "::error::No candidate tags found for version ${{ steps.version.outputs.version }}"
            exit 1
          fi
          echo "candidate=${CANDIDATE}" >> $GITHUB_OUTPUT

      - name: Check if already released
        id: check-released
        run: |
          CLEAN_TAG="${{ steps.version.outputs.version }}"
          if git tag -l "${CLEAN_TAG}" | grep -q .; then
            echo "already=true" >> $GITHUB_OUTPUT
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-released.outputs.already == 'true'
        run: |
          echo "::notice::Release ${{ steps.version.outputs.version }} already exists — skipping."
          echo "skip=true" >> $GITHUB_OUTPUT

      - name: Derive clean release tag
        id: derive
        # Only runs if not skipped
        if: steps.check-released.outputs.already != 'true'
        run: |
          CLEAN_TAG="${{ steps.version.outputs.version }}"
          echo "clean_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: steps.check-released.outputs.already != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate images by digest (no rebuild)
        if: steps.check-released.outputs.already != 'true'
        id: promote
        run: |
          CLEAN="${{ steps.derive.outputs.clean_tag }}"
          CANDIDATE="${{ steps.select.outputs.candidate }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          echo "Promoting candidate ${CANDIDATE} → release ${CLEAN} (by digest, no rebuild)"

          # Promote udi-tools: candidate tag is vX.Y.Z-rc.N
          DIGEST=$(docker pull --quiet ${REGISTRY}/udi-tools:${CANDIDATE} 2>&1 | grep -o 'sha256:[a-f0-9]*')
          docker tag ${DIGEST} ${REGISTRY}/udi-tools:${CLEAN}
          docker push ${REGISTRY}/udi-tools:${CLEAN}
          docker tag ${DIGEST} ${REGISTRY}/udi-tools:latest
          docker push ${REGISTRY}/udi-tools:latest

          # Promote udi-tools-claude: candidate tag is vX.Y.Z-rc.N-claude
          DIGEST=$(docker pull --quiet ${REGISTRY}/udi-tools-claude:${CANDIDATE}-claude 2>&1 | grep -o 'sha256:[a-f0-9]*')
          docker tag ${DIGEST} ${REGISTRY}/udi-tools-claude:${CLEAN}-claude
          docker push ${REGISTRY}/udi-tools-claude:${CLEAN}-claude
          docker tag ${DIGEST} ${REGISTRY}/udi-tools-claude:latest
          docker push ${REGISTRY}/udi-tools-claude:latest

          # Promote devbox: candidate tag is vX.Y.Z-rc.N
          DIGEST=$(docker pull --quiet ${REGISTRY}/devbox:${CANDIDATE} 2>&1 | grep -o 'sha256:[a-f0-9]*')
          docker tag ${DIGEST} ${REGISTRY}/devbox:${CLEAN}
          docker push ${REGISTRY}/devbox:${CLEAN}
          docker tag ${DIGEST} ${REGISTRY}/devbox:latest
          docker push ${REGISTRY}/devbox:latest

          # Promote devbox-claude: candidate tag is vX.Y.Z-rc.N (same rc tag, separate ghcr repo)
          DIGEST=$(docker pull --quiet ${REGISTRY}/devbox-claude:${CANDIDATE} 2>&1 | grep -o 'sha256:[a-f0-9]*')
          docker tag ${DIGEST} ${REGISTRY}/devbox-claude:${CLEAN}
          docker push ${REGISTRY}/devbox-claude:${CLEAN}
          docker tag ${DIGEST} ${REGISTRY}/devbox-claude:latest
          docker push ${REGISTRY}/devbox-claude:latest

      - name: Create GitHub Release with version changes section
        if: steps.check-released.outputs.already != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLEAN="${{ steps.derive.outputs.clean_tag }}"
          CANDIDATE="${{ steps.select.outputs.candidate }}"

          # Start notes with Image version changes from manifest
          NOTES_FILE=$(mktemp)
          echo "## Image version changes" > "$NOTES_FILE"
          if [ -f version-lock-manifest.yaml ]; then
            cat version-lock-manifest.yaml >> "$NOTES_FILE"
          else
            echo "_No version lock manifest found. This release was not cut from a candidate._" >> "$NOTES_FILE"
          fi
          echo "" >> "$NOTES_FILE"

          # Append auto-generated release notes (PRs since last release)
          gh release create "${CLEAN}" --generate-notes --target main --prerelease=false \
            --notes-file "$NOTES_FILE" 2>&1 || {
            echo "Release may already exist or failed to create"
            exit 1
          }
