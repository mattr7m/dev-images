# Weekly release: pick the latest green candidate, cut a clean vX.Y.Z GitHub Release,
# and promote by digest (no rebuild). Skips if already released.

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: "Candidate tag to release (e.g. v0.2.0-rc.1); omit for latest"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get VERSION
        id: version
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Select candidate tag
        id: select
        run: |
          CANDIDATE="${{ github.event.inputs.candidate_tag }}"
          if [ -z "$CANDIDATE" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            CANDIDATE=$(git tag -l "v${VERSION}-rc.*" | sort -V | tail -1)
          fi
          if [ -z "$CANDIDATE" ]; then
            echo "::error::No candidate tags found for version ${{ steps.version.outputs.version }}"
            exit 1
          fi
          echo "candidate=${CANDIDATE}" >> $GITHUB_OUTPUT

      - name: Check if already released
        id: check-released
        run: |
          CLEAN_TAG="${{ steps.version.outputs.version }}"
          if git tag -l "${CLEAN_TAG}" | grep -q .; then
            echo "already=true" >> $GITHUB_OUTPUT
          else
            echo "already=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already released
        if: steps.check-released.outputs.already == 'true'
        run: |
          echo "::notice::Release ${{ steps.version.outputs.version }} already exists — skipping."

      - name: Derive clean release tag
        id: derive
        run: |
          CLEAN_TAG="${{ steps.version.outputs.version }}"
          echo "clean_tag=${CLEAN_TAG}" >> $GITHUB_OUTPUT

      # Must precede the build/promote steps below: they pull the private
      # candidate images by tag, which 401s without an authenticated daemon.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push candidate images for release
        id: build
        run: |
          # Use build-images.yml reusable workflow to build all images from the candidate state
          # We rebuild here (not promote-by-digest) because we need a clean tag for the release
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          CLEAN="${{ steps.derive.outputs.clean_tag }}"
          CANDIDATE="${{ steps.select.outputs.candidate }}"

          echo "Building from candidate ${CANDIDATE} → release ${CLEAN}"

          # Pull udi-tools candidate, tag as release
          docker pull ${REGISTRY}/udi-tools:${CANDIDATE}
          docker tag ${REGISTRY}/udi-tools:${CANDIDATE} ${REGISTRY}/udi-tools:${CLEAN}
          docker push ${REGISTRY}/udi-tools:${CLEAN}

          # Pull udi-tools-claude candidate, tag as release
          docker pull ${REGISTRY}/udi-tools-claude:${CANDIDATE}-claude
          docker tag ${REGISTRY}/udi-tools-claude:${CANDIDATE}-claude ${REGISTRY}/udi-tools-claude:${CLEAN}-claude
          docker push ${REGISTRY}/udi-tools-claude:${CLEAN}-claude

          # Pull devbox candidate, tag as release
          docker pull ${REGISTRY}/devbox:${CANDIDATE}
          docker tag ${REGISTRY}/devbox:${CANDIDATE} ${REGISTRY}/devbox:${CLEAN}
          docker push ${REGISTRY}/devbox:${CLEAN}

          # Pull devbox-claude candidate, tag as release
          docker pull ${REGISTRY}/devbox-claude:${CANDIDATE}
          docker tag ${REGISTRY}/devbox-claude:${CANDIDATE} ${REGISTRY}/devbox-claude:${CLEAN}
          docker push ${REGISTRY}/devbox-claude:${CLEAN}

      - name: Create GitHub Release with version changes section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLEAN="${{ steps.derive.outputs.clean_tag }}"
          CANDIDATE="${{ steps.select.outputs.candidate }}"

          # Start notes with Image version changes from manifest
          NOTES_FILE=$(mktemp)
          echo "## Image version changes" > "$NOTES_FILE"
          if [ -f version-lock-manifest.yaml ]; then
            cat version-lock-manifest.yaml >> "$NOTES_FILE"
          else
            echo "_No version lock manifest found. This release was not cut from a candidate._" >> "$NOTES_FILE"
          fi
          echo "" >> "$NOTES_FILE"

          # Append auto-generated release notes (PRs since last release)
          gh release create "${CLEAN}" --generate-notes --target main --prerelease=false \
            --notes-file "$NOTES_FILE" 2>&1 || {
            echo "Release may already exist or failed to create"
            exit 1
          }

      - name: Promote candidates to :latest
        run: |
          CLEAN="${{ steps.derive.outputs.clean_tag }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          # udi-tools
          docker pull ${REGISTRY}/udi-tools:${CLEAN}
          docker tag ${REGISTRY}/udi-tools:${CLEAN} ${REGISTRY}/udi-tools:latest
          docker push ${REGISTRY}/udi-tools:latest

          # udi-tools-claude
          docker pull ${REGISTRY}/udi-tools-claude:${CLEAN}-claude
          docker tag ${REGISTRY}/udi-tools-claude:${CLEAN}-claude ${REGISTRY}/udi-tools-claude:latest
          docker push ${REGISTRY}/udi-tools-claude:latest

          # devbox
          docker pull ${REGISTRY}/devbox:${CLEAN}
          docker tag ${REGISTRY}/devbox:${CLEAN} ${REGISTRY}/devbox:latest
          docker push ${REGISTRY}/devbox:latest

          # devbox-claude
          docker pull ${REGISTRY}/devbox-claude:${CLEAN}
          docker tag ${REGISTRY}/devbox-claude:${CLEAN} ${REGISTRY}/devbox-claude:latest
          docker push ${REGISTRY}/devbox-claude:latest
