# Cut a pinned candidate: resolve base digest + pin all ARG versions,
# commit a version lock manifest, build, push :candidate + vX.Y.Z-rc.N.
# Supports: udi-tools, udi-tools-claude, devbox, devbox-claude.

on:
  schedule:
    # Every weekday at 07:00 UTC
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
    inputs:
      image:
        description: "Image to cut candidate for (udi-tools, udi-tools-claude, devbox, or devbox-claude)"
        type: string
        required: false
        default: ""

permissions:
  contents: write
  packages: write

jobs:
  cut-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free disk space before build
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af --volumes 2>/dev/null || true
          df -h /

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get VERSION
        id: version
        run: |
          echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Resolve base image digest
        id: base-digest
        run: |
          DIGEST=$(skopeo inspect --format '{{.Digest}}' docker://quay.io/devfile/universal-developer-image:ubi9-e420701 2>/dev/null || echo "unresolved")
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Compute next rc number
        id: rc-num
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RC_NUM=0
          # Only consider base rc tags (vX.Y.Z-rc.N), not derivative-specific ones like -claude, -devbox
          EXISTING=$(git tag -l "v${VERSION}-rc.*" 2>/dev/null | grep -E "^v${VERSION}-rc\.[0-9]+$" | sed 's/v[^-]*-rc//' | sort -t. -k1,1n | tail -1)
          if [ -n "$EXISTING" ]; then
            RC_NUM=$((EXISTING + 1))
          fi
          echo "num=${RC_NUM}" >> $GITHUB_OUTPUT

      - name: Extract ARG versions from Containerfiles
        id: args
        run: |
          udi_cf="images/udi-tools/Containerfile"
          claude_cf="images/udi-tools-claude/Containerfile"
          devbox_cf="images/devbox/Containerfile"

          # udi-tools ARGs
          ARGO_VERSION=$(grep '^ARG ARGO_VERSION=' "$udi_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")
          GH_VERSION=$(grep '^ARG GH_VERSION=' "$udi_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")
          ROXCTL_VERSION=$(grep '^ARG ROXCTL_VERSION=' "$udi_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")
          KUBESEAL_VERSION=$(grep '^ARG KUBESEAL_VERSION=' "$udi_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")
          KUSTOMIZE_VERSION=$(grep '^ARG KUSTOMIZE_VERSION=' "$udi_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")
          KUBECOLOR_VERSION=$(grep '^ARG KUBECOLOR_VERSION=' "$udi_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")

          # udi-tools-claude ARGs
          CLAUDE_VERSION=$(grep '^ARG CLAUDE_CODE_VERSION=' "$claude_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")

          # devbox ARGs
          DEVBOX_GH_VERSION=$(grep '^ARG GH_VERSION=' "$devbox_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")
          YQ_VERSION=$(grep '^ARG YQ_VERSION=' "$devbox_cf" | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")

          # devbox-claude ARGs
          NODE_VERSION=$(grep '^ARG NODE_VERSION=' "images/devbox-claude/Containerfile" 2>/dev/null | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")
          CLAUDE_CODE_VERSION=$(grep '^ARG CLAUDE_CODE_VERSION=' "images/devbox-claude/Containerfile" 2>/dev/null | head -1 | cut -d= -f2 | tr -d '"' | tr -d "'")

          echo "argo=${ARGO_VERSION}" >> $GITHUB_OUTPUT
          echo "gh=${GH_VERSION}" >> $GITHUB_OUTPUT
          echo "roxctl=${ROXCTL_VERSION}" >> $GITHUB_OUTPUT
          echo "kubeseal=${KUBESEAL_VERSION}" >> $GITHUB_OUTPUT
          echo "kustomize=${KUSTOMIZE_VERSION}" >> $GITHUB_OUTPUT
          echo "kubecolor=${KUBECOLOR_VERSION}" >> $GITHUB_OUTPUT
          echo "claude=${CLAUDE_VERSION}" >> $GITHUB_OUTPUT
          echo "devbox_gh=${DEVBOX_GH_VERSION}" >> $GITHUB_OUTPUT
          echo "yq=${YQ_VERSION}" >> $GITHUB_OUTPUT
          echo "node=${NODE_VERSION}" >> $GITHUB_OUTPUT
          echo "claude_code=${CLAUDE_CODE_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit version lock manifest
        id: manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_DIGEST="${{ steps.base-digest.outputs.digest }}"
          RC_NUM="${{ steps.rc-num.outputs.num }}"
          RC_TAG="v${VERSION}-rc.${RC_NUM}"

          cat > version-lock-manifest.yaml <<EOF
          version: "${RC_TAG}"
          base_image:
            reference: "quay.io/devfile/universal-developer-image:ubi9-e420701"
            digest: "${BASE_DIGEST}"
          udi-tools:
            argo_version: "${{ steps.args.outputs.argo }}"
            gh_version: "${{ steps.args.outputs.gh }}"
            roxctl_version: "${{ steps.args.outputs.roxctl }}"
            kubeseal_version: "${{ steps.args.outputs.kubeseal }}"
            kustomize_version: "${{ steps.args.outputs.kustomize }}"
            kubecolor_version: "${{ steps.args.outputs.kubecolor }}"
          udi-tools-claude:
            claude_code_version: "${{ steps.args.outputs.claude }}"
          devbox:
            gh_version: "${{ steps.args.outputs.devbox_gh }}"
            yq_version: "${{ steps.args.outputs.yq }}"
          devbox-claude:
            node_version: "${{ steps.args.outputs.node }}"
            claude_code_version: "${{ steps.args.outputs.claude_code }}"
          EOF

          git config user.name "Image Maintainer Agent"
          git config user.email "agents@tr5k.ai"
          git add version-lock-manifest.yaml
          git commit -m "Add version lock manifest for ${RC_TAG}" || true

          echo "rc_tag=${RC_TAG}" >> $GITHUB_OUTPUT

      - name: Build udi-tools candidate
        id: build-udi
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          RC="${{ steps.manifest.outputs.rc_tag }}"
          docker build -t ${REGISTRY}/udi-tools:${RC} -f images/udi-tools/Containerfile . >> build.log 2>&1
          IMAGE_ID=$(docker images --format '{{.ID}}' ${REGISTRY}/udi-tools:${RC} | head -1)
          echo "image_id=${IMAGE_ID}" >> $GITHUB_OUTPUT
          tail -n 30 build.log

      - name: Build udi-tools-claude candidate
        id: build-claude
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          RC="${{ steps.manifest.outputs.rc_tag }}"
          docker build -t ${REGISTRY}/udi-tools-claude:${RC}-claude -f images/udi-tools-claude/Containerfile . >> build2.log 2>&1
          IMAGE_ID=$(docker images --format '{{.ID}}' ${REGISTRY}/udi-tools-claude:${RC}-claude | head -1)
          echo "image_id=${IMAGE_ID}" >> $GITHUB_OUTPUT
          tail -n 30 build2.log

      - name: Build devbox candidate
        id: build-devbox
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          RC="${{ steps.manifest.outputs.rc_tag }}"
          docker build -t ${REGISTRY}/devbox:${RC} -f images/devbox/Containerfile . >> build3.log 2>&1
          IMAGE_ID=$(docker images --format '{{.ID}}' ${REGISTRY}/devbox:${RC} | head -1)
          echo "image_id=${IMAGE_ID}" >> $GITHUB_OUTPUT
          tail -n 30 build3.log

      - name: Build devbox-claude candidate
        id: build-devbox-claude
        run: |
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          RC="${{ steps.manifest.outputs.rc_tag }}"
          docker build -t ${REGISTRY}/devbox-claude:${RC} -f images/devbox-claude/Containerfile . >> build4.log 2>&1
          IMAGE_ID=$(docker images --format '{{.ID}}' ${REGISTRY}/devbox-claude:${RC} | head -1)
          echo "image_id=${IMAGE_ID}" >> $GITHUB_OUTPUT
          tail -n 30 build4.log

      - name: Push candidate tags
        if: steps.build-udi.outputs.image_id != '' || steps.build-devbox.outputs.image_id != ''
        run: |
          RC="${{ steps.manifest.outputs.rc_tag }}"
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          # udi-tools: push with rc tag + :latest + :candidate
          if [ -n "${{ steps.build-udi.outputs.image_id }}" ]; then
            UDI_ID="${{ steps.build-udi.outputs.image_id }}"
            docker tag ${UDI_ID} ${REGISTRY}/udi-tools:${RC}
            docker tag ${UDI_ID} ${REGISTRY}/udi-tools:latest
            docker tag ${UDI_ID} ${REGISTRY}/udi-tools:candidate
            docker push ${REGISTRY}/udi-tools:${RC}
            docker push ${REGISTRY}/udi-tools:latest
            docker push ${REGISTRY}/udi-tools:candidate
          fi

          # udi-tools-claude
          if [ -n "${{ steps.build-claude.outputs.image_id }}" ]; then
            CLAUDE_ID="${{ steps.build-claude.outputs.image_id }}"
            docker tag ${CLAUDE_ID} ${REGISTRY}/udi-tools-claude:${RC}-claude
            docker tag ${CLAUDE_ID} ${REGISTRY}/udi-tools-claude:latest
            docker tag ${CLAUDE_ID} ${REGISTRY}/udi-tools-claude:candidate
            docker push ${REGISTRY}/udi-tools-claude:${RC}-claude
            docker push ${REGISTRY}/udi-tools-claude:latest
            docker push ${REGISTRY}/udi-tools-claude:candidate
          fi

          # devbox
          if [ -n "${{ steps.build-devbox.outputs.image_id }}" ]; then
            DEVBOX_ID="${{ steps.build-devbox.outputs.image_id }}"
            docker tag ${DEVBOX_ID} ${REGISTRY}/devbox:${RC}
            docker tag ${DEVBOX_ID} ${REGISTRY}/devbox:latest
            docker tag ${DEVBOX_ID} ${REGISTRY}/devbox:candidate
            docker push ${REGISTRY}/devbox:${RC}
            docker push ${REGISTRY}/devbox:latest
            docker push ${REGISTRY}/devbox:candidate
          fi

          # devbox-claude
          if [ -n "${{ steps.build-devbox-claude.outputs.image_id }}" ]; then
            DEVBOX_CLAUDE_ID="${{ steps.build-devbox-claude.outputs.image_id }}"
            docker tag ${DEVBOX_CLAUDE_ID} ${REGISTRY}/devbox-claude:${RC}
            docker tag ${DEVBOX_CLAUDE_ID} ${REGISTRY}/devbox-claude:latest
            docker tag ${DEVBOX_CLAUDE_ID} ${REGISTRY}/devbox-claude:candidate
            docker push ${REGISTRY}/devbox-claude:${RC}
            docker push ${REGISTRY}/devbox-claude:latest
            docker push ${REGISTRY}/devbox-claude:candidate
          fi

      - name: Create and push git tags
        run: |
          RC="${{ steps.manifest.outputs.rc_tag }}"
          # udi-tools tag
          if [ -n "${{ steps.build-udi.outputs.image_id }}" ]; then
            git tag -a "${RC}" -m "Candidate ${RC} (udi-tools)" || true
          fi
          # udi-tools-claude tag
          if [ -n "${{ steps.build-claude.outputs.image_id }}" ]; then
            git tag -a "${RC}-claude" -m "Candidate ${RC}-claude (udi-tools-claude)" || true
          fi
          # devbox + devbox-claude share the same rc tag (one ghcr repo per derivative)
          if [ -n "${{ steps.build-devbox.outputs.image_id }}" ]; then
            git tag -a "${RC}-devbox" -m "Candidate ${RC} (devbox)" || true
          fi
          if [ -n "${{ steps.build-devbox-claude.outputs.image_id }}" ]; then
            git tag -a "${RC}-devbox-claude" -m "Candidate ${RC} (devbox-claude)" || true
          fi
          git push origin "${RC}" "${RC}-claude" "${RC}-devbox" "${RC}-devbox-claude" --force-with-lease 2>/dev/null || true
